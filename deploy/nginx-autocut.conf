# AutoCut Video - Nginx Configuration
# Domain: autocut.allinai.asia
# SSL managed by Certbot

server {
    server_name autocut.allinai.asia;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Upload size limit (500MB for video files)
    client_max_body_size 500M;

    # Frontend - Next.js (proxied to PM2-managed Node process)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets - served directly from filesystem (standalone mode does not serve these)
    location /_next/static/ {
        alias /www/wwwroot/autocut-video/frontend/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Backend API - FastAPI (proxied to Uvicorn)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }

    # Logs
    access_log /var/log/nginx/autocut_access.log;
    error_log  /var/log/nginx/autocut_error.log;

    # SSL - managed by Certbot
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/autocut.allinai.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autocut.allinai.asia/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP -> HTTPS redirect - managed by Certbot
server {
    if ($host = autocut.allinai.asia) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name autocut.allinai.asia;
    return 404;
}
