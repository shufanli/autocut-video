issues:
  # ============================================================
  # 1. 技术可行性 (tech_feasibility)
  # ============================================================

  - severity: P1
    category: tech_feasibility
    description: >
      Whisper API 调用方式未明确：是使用 OpenAI 托管的 Whisper API（付费、有请求限制），
      还是自建 Whisper large-v3 推理服务（需 GPU 服务器）。成本模型写 0.45 元/10 分钟
      对应 OpenAI API 定价（$0.006/min），但自建可大幅降低边际成本。
      MVP 阶段选择哪条路径直接影响服务器架构和成本结构。
    recommendation: >
      明确 Whisper 部署方案：(a) MVP 用 OpenAI Whisper API（快速上线、零运维），
      在技术 Spike 中测试中文口播准确率；(b) 若日处理量超过 50 条/天，迁移到
      自建 Whisper（阿里云 GPU 实例按量付费或 Replicate 等 Serverless GPU）。
      在 PRD 中补充这一决策点。

  - severity: P2
    category: tech_feasibility
    description: >
      Section 6 非功能需求表第 7 行仍写"文字稿发送至 LLM 时脱敏处理"，
      但 MVP 不调用 LLM，此描述会误导开发者。且"脱敏处理"的定义在上轮已被
      标记为模糊（口播内容本身就是用户要发布的公开内容），未修正。
    recommendation: >
      将 Section 6 隐私行改为：(a) MVP 阶段——"音频发送至 OpenAI Whisper API 进行
      语音识别，不发送至其他第三方"；(b) v1.1 阶段——"文字稿发送至 LLM 进行内容分析，
      用户在注册时已勾选同意《隐私政策》中的第三方数据传输条款"。删除"脱敏处理"
      这一模糊表述。

  # ============================================================
  # 2. 数据采集 (data_collection)
  # ============================================================

  - severity: P2
    category: data_collection
    description: >
      埋点清单中 preview_music_listen、preview_music_change、preview_effect_remove
      三个事件属于 v1.1 功能（配乐和特效），但未标注版本。开发 MVP 时可能误以为
      需要实现这些埋点及其对应的 UI 交互。
    recommendation: >
      在埋点清单中为每个事件增加"版本"列（MVP / v1.1），或将 v1.1 事件
      单独分组。避免 MVP 开发阶段的范围混淆。

  # ============================================================
  # 3. 合规 (compliance)
  # ============================================================

  - severity: P1
    category: compliance
    description: >
      MVP 仍会将用户视频音频发送至 OpenAI Whisper API（海外服务器）。
      根据《个人信息保护法》第 38-40 条，向境外提供个人信息需满足安全评估、
      标准合同或认证条件之一。虽然口播视频多为公开内容，但音频中可能包含
      个人信息（姓名、电话、地址等用户无意提及的内容）。
      PRD 未设计用户显式同意跨境数据传输的机制。
    recommendation: >
      (1) 在注册/登录流程的《隐私政策》中增加"跨境数据传输"条款，明确告知
      音频数据将传输至 OpenAI（美国）进行语音识别；
      (2) 首次上传时增加一次性弹窗确认"您的音频将发送至第三方语音识别服务"；
      (3) 长期方案：评估国内替代（阿里云语音识别/讯飞），已在技术风险表中
      列为备选，建议将合规需求作为迁移评估的加权因素。

  # ============================================================
  # 4. 付费闭环 (payment)
  # ============================================================

  - severity: P2
    category: payment
    description: >
      "不限量年度 1499 元/年，每日上限 10 条"这一套餐在 MVP 阶段不需要实现，
      但 PRD 未标注其版本归属。若 MVP 实现全部四个定价方案，支付和额度管理逻辑
      会显著增加复杂度（需要处理年度额度、日限额、超出计费等多种逻辑）。
    recommendation: >
      明确 MVP 仅实现"按条付费"和"月度订阅"两种方案。年度订阅和不限量年度
      降级为 v1.1。在 Section 10.1 定价表中增加"版本"列标注。

  # ============================================================
  # 5. 反作弊 (anti_abuse)
  # ============================================================

  - severity: P2
    category: anti_abuse
    description: >
      下载链接安全性（上轮 R1-P2-3）未在本次修订中体现。
      GET /api/tasks/{id}/download 端点若仅靠 JWT 认证，
      task_id 为 UUID 虽不可枚举，但若 token 泄露或 IDOR 漏洞存在，
      仍可能导致未授权访问他人视频。
    recommendation: >
      在 API 设计中补充：(1) download 端点验证 task.user_id == 当前用户；
      (2) 返回带签名的临时 URL（signed URL，有效期 10 分钟），
      而非直接返回文件流。这是标准实践，实现成本低。

  # ============================================================
  # 6. MVP 边界 (mvp_scope)
  # ============================================================

  - severity: P1
    category: mvp_scope
    description: >
      API 端点中 /api/tasks/{id}/preview 的响应体仍包含 music 和 effects 字段
      （Section 13.2：{transcript, music, effects, subtitles}），
      PUT /api/tasks/{id}/preview 请求体包含 selected_music 和 removed_effects。
      这些是 v1.1 字段，会误导 MVP 开发实现不需要的逻辑。
    recommendation: >
      将 MVP 阶段的 preview API 响应精简为 {transcript, subtitles, stutter_marks}，
      请求体精简为 {stutter_decisions: [{id, action}], subtitle_style, subtitle_position}。
      music 和 effects 相关字段标注 v1.1。

  - severity: P2
    category: mvp_scope
    description: >
      Section 11.3 历史记录旅程中提到"标题（取自内容分析 summary）"，但 MVP
      不含内容理解 Agent（Agent 3），不会生成 summary。需要明确 MVP 阶段
      历史记录的标题来源（如使用第一个上传文件的文件名）。
    recommendation: >
      MVP 历史记录标题使用原始文件名或"处理于 {日期时间}"格式。
      v1.1 引入内容理解后再替换为 AI 生成的 summary。

verdict: pass
notes: >
  修订后的 PRD 有效解决了上轮全部 4 个 P0 和大部分 P1 问题。MVP 范围清晰收敛到
  机械层（去口误 + 字幕 + 合并），与 design-mvp.md 对齐。内容审核和反作弊机制
  已补充到位。本轮无 P0 问题，剩余 3 个 P1（Whisper 部署方案未明确、跨境数据
  合规机制缺失、preview API 包含 v1.1 字段）和 5 个 P2 均为可在开发阶段迭代
  修复的细节问题，不阻塞 MVP 启动。

  建议在技术 Spike 阶段优先处理：
  (1) Whisper 中文口播准确率验证 + 部署方案选型；
  (2) 跨境数据传输的隐私政策条款起草；
  (3) preview API schema 按 MVP/v1.1 拆分。
